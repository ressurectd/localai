name: Release

# Builds the artefacts and attaches them to a draft release. Deliberately a *draft*:
# the maintainer reviews and publishes. An unsigned executable going out
# automatically on every tag is one bad tag away from an embarrassment.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Gate
        # Never ship something that has not passed the same gate a commit must pass.
        run: python tasks.py check

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build executable and installer
        run: python tasks.py release

      - name: Verify the installer actually installs and runs
        # A successful compile proves nothing about a frozen app: they fail at
        # runtime over data files PyInstaller could not infer. Install it, run it,
        # remove it.
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist/installer/*.exe | Select-Object -First 1
          $dir = "$env:TEMP\ai-verify"
          $p = Start-Process $setup.FullName -Wait -PassThru -ArgumentList `
            '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART',"/DIR=$dir",`
            '/MERGETASKS=!addtopath,!desktopicon'
          if ($p.ExitCode -ne 0) { throw "installer exited $($p.ExitCode)" }
          if (-not (Test-Path "$dir\ai.exe")) { throw "ai.exe was not installed" }
          & "$dir\ai.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "installed ai.exe could not run" }
          & "$dir\ai.exe" capabilities --json | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "installed ai.exe could not report capabilities" }
          $u = Start-Process "$dir\unins000.exe" -Wait -PassThru -ArgumentList `
            '/VERYSILENT','/SUPPRESSMSGBOXES'
          if ($u.ExitCode -ne 0) { throw "uninstaller exited $($u.ExitCode)" }
          Write-Host "installer verified: install, run, uninstall"

      - name: Checksums
        shell: pwsh
        run: |
          Get-ChildItem dist/installer/*.exe | ForEach-Object {
            (Get-FileHash $_.FullName -Algorithm SHA256).Hash + "  " + $_.Name
          } | Set-Content dist/installer/SHA256SUMS.txt
          Get-Content dist/installer/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ai-windows
          path: dist/installer/*

      - name: Draft release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          generate_release_notes: true
          files: dist/installer/*
          body: |
            ## Install

            Download `ai-setup-*.exe` and run it. Per-user install, no admin rights.

            Python is not required. You do need [Ollama](https://ollama.com) and at
            least one model (`ollama pull qwen3:8b`).

            The executable is unsigned, so SmartScreen will show
            "Windows protected your PC" on first run — choose **More info → Run anyway**.
            Verify the download against `SHA256SUMS.txt` if you would rather check.
